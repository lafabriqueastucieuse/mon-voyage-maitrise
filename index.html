function ensurePlanDay(date){var t=activeTrip(),found=t.plan.filter(function(d){return d.date===date;})[0];if(found)return found.id;var id=uid("day");t.plan=t.plan.concat([{id:id,date:date,items:[]}]);upsertTrip(t);saveState();return id;}
function scrCalendar(t){
  var start=fromISO(t.startDate),end=fromISO(t.endDate),days=[];
  if(start&&end){var d=new Date(start);while(d<=end){days.push(toISO(d));d.setDate(d.getDate()+1);}}
  var totalPlan=t.plan.reduce(function(a,d){return a+d.items.length;},0);
  var _calic={cal:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='5' width='18' height='16' rx='2.4'/><path d='M3 9.5h18M8 3v4M16 3v4'/></svg>",clock:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='9'/><path d='M12 7.2v5l3.2 2'/></svg>",star:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><path d='M12 3.2l2.6 5.4 5.9.8-4.3 4.2 1 5.9L12 16.9l-5.2 2.8 1-5.9L3.5 9.4l5.9-.8z'/></svg>",map:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><path d='M9 4 3 6.2v13.6L9 17.6l6 2.2 6-2.2V4l-6 2.2L9 4z'/><path d='M9 4v13.6M15 6.2v13.6'/></svg>"};
  var head=sectionH("Calendrier","Une vue compacte des jours, étapes et budgets");
  if(!days.length)return '<div class="stack stack-lg fade-in calendar-screen">'+head+'<div class="card panel-note">'+emptyHint("📅","Dates à préciser","Ajoute des dates de départ et retour dans ton voyage pour voir le calendrier.")+'</div></div>';
  var today=todayISO();
  var totalCost=t.plan.reduce(function(a,d){return a+d.items.reduce(function(s,i){return s+(i.status!=="annule"?(i.plannedCost||0):0);},0);},0);
  var cells=days.map(function(iso){
    var day=t.plan.filter(function(p){return p.date===iso;})[0];
    var items=(day?day.items.filter(function(i){return i.status!=="annule";}):[]).slice().sort(function(a,b){return (a.time||"").localeCompare(b.time||"");});
    var cost=items.reduce(function(a,i){return a+(i.plannedCost||0);},0),idx=dayIndex(t,iso),hasItems=items.length>0;
    var tag=(idx===1)?badge("Départ","primary"):(idx===days.length?badge("Retour","accent"):(iso===today?badge("Aujourd'hui","success"):""));
    var dt=fromISO(iso),wd=dt?dt.toLocaleDateString("fr-FR",{weekday:"short"}):"",dnum=dt?dt.getDate():"",mon=dt?dt.toLocaleDateString("fr-FR",{month:"short"}).replace(".",""):"";
    var preview=items.slice(0,2).map(function(i){var m=PLAN_BY[i.category]||{icon:"•"};return '<div class="cal-act"><span class="cal-act-t tnum">'+esc(i.time||"··:··")+'</span><span class="cal-act-i">'+m.icon+'</span><span class="cal-act-n trunc">'+esc(i.title||"Étape")+'</span></div>';}).join("");
    var more=items.length>2?'<div class="cal-more">+'+(items.length-2)+' autre'+(items.length-2>1?"s":"")+'</div>':"";
    var body=hasItems?'<div class="cal-acts">'+preview+more+'</div>':'<div class="cal-acts cal-acts-empty"><div class="cal-freeday">Journée libre</div><div class="cal-noact">Aucune étape prévue</div></div>';
    var foot=hasItems?'<div class="cal-foot"><span class="cal-count">'+items.length+' étape'+(items.length>1?"s":"")+'</span>'+(cost>0?'<span class="cal-cost tnum">'+money(cost,t.currency)+'</span>':"")+'</div>':"";
    return '<div class="calendar-day trip-day '+(hasItems?'cal-day-active':'cal-day-empty')+(iso===today?' today':'')+(idx===1?' depart':idx===days.length?' retour':'')+'"><button type="button" class="cal-day-btn" data-action="calendar-day" data-date="'+iso+'"><div class="cal-head"><div class="cal-date"><div class="cal-dnum tnum">'+dnum+'</div><div class="cal-dmeta"><div class="cal-wd">'+esc(wd)+'</div><div class="xs muted cal-dlabel">'+esc(mon)+' · Jour '+idx+'</div></div></div>'+(tag||"")+'</div>'+body+foot+'</button><button type="button" class="cal-add-step" data-action="calendar-add-step" data-date="'+iso+'">＋ étape</button></div>';
  }).join("");
  var summary='<div class="card cal-summary"><div class="cal-summary-head"><span class="cal-summary-ic" aria-hidden="true">'+_calic.cal+'</span><div class="cal-summary-title">Aperçu du séjour</div></div>'+
    '<div class="cal-summary-stats"><div class="cal-stat"><div class="cal-stat-l"><span class="cal-stat-ic" aria-hidden="true">'+_calic.clock+'</span>Durée</div><div class="cal-stat-v tnum">'+days.length+' j</div></div><div class="cal-stat"><div class="cal-stat-l"><span class="cal-stat-ic" aria-hidden="true">'+_calic.star+'</span>Activités</div><div class="cal-stat-v tnum">'+totalPlan+'</div></div></div>'+
    '<div class="cal-summary-budget"><span>Budget prévu par étapes</span><span class="cal-summary-amount tnum">'+money(totalCost,t.currency)+'</span></div>'+
    '<button type="button" class="cal-summary-cta" data-action="navigate" data-screen="planning"><span class="cal-cta-ic" aria-hidden="true">'+_calic.map+'</span> Voir l\'itinéraire détaillé</button></div>';
  return '<div class="stack stack-lg fade-in calendar-screen">'+head+'<div class="page-grid two reverse"><div>'+summary+'</div><div class="calendar-grid">'+cells+'</div></div></div>';
}

function openForgottenBudget(cat){var t=activeTrip(),m=catMeta(cat);var current=(t.budgetCategories.filter(function(c){return c.key===cat;})[0]||{}).planned||"";var body='<p class="small muted">Prévois ce poste sans quitter l’écran. Tu pourras le modifier plus tard dans Budget.</p><div class="stack" style="margin-top:12px"><label class="field"><span class="lbl">Catégorie liée</span><select id="fg-cat" class="ctrl">'+optionList(CATEGORY_META,cat,"key","label")+'</select></label><label class="field"><span class="lbl">Montant prévu</span><input type="number" min="0" step="any" id="fg-amount" class="ctrl" value="'+current+'" placeholder="0"></label></div>';openModal(modalShell("Prévoir au budget — "+m.label,body,'<button class="btn btn-secondary" data-action="close-modal">Annuler</button><button class="btn btn-primary" data-action="submit-forgotten-budget">Enregistrer</button>'));}
function submitForgottenBudget(){var cat=val("fg-cat"),amount=num(val("fg-amount"));if(!(amount>0)){flash("Saisis un montant prévu");return;}updateTrip(function(t){var ex=t.budgetCategories.some(function(c){return c.key===cat;});t.budgetCategories=ex?t.budgetCategories.map(function(c){return c.key===cat?Object.assign({},c,{planned:amount}):c;}):t.budgetCategories.concat([Object.assign(makeCategory(cat,catMeta(cat).label),{planned:amount})]);return t;});closeModal();flash("Budget prévu ✅");}
function openForgottenExpense(cat,label){openExpense(cat,null);setTimeout(function(){var n=document.getElementById("ex-note");if(n&&!n.value)n.value=label||catMeta(cat).label;var t=activeTrip();if(t){var c=t.budgetCategories.filter(function(x){return x.key===cat;})[0];var resv=c?Math.max(0,(c.planned||0)-spentForCategory(t,cat)):0;var am=document.getElementById("ex-amount");if(am&&!am.value&&resv>0)am.value=resv;}},0);}

function openParticipant(id){var t=activeTrip();var p=id?t.participants.filter(function(x){return x.id===id;})[0]:null;p=p||{};var tags=Array.isArray(p.needsTags)?p.needsTags:[];var checks=PARTICIPANT_NEEDS.map(function(n){return '<label class="check-card"><input type="checkbox" class="chk" data-pneed="'+n.key+'" '+(tags.indexOf(n.key)>=0?'checked':'')+'><span>'+n.icon+' '+esc(n.label)+'</span></label>';}).join("");var body='<div class="stack"><label class="field"><span class="lbl">Prénom</span><input id="pt-name" class="ctrl" value="'+esc(p.name||"")+'" placeholder="Ex : Alex"></label><label class="field"><span class="lbl">Profil principal</span><select id="pt-profile" class="ctrl">'+optionList(PARTICIPANT_PROFILES,p.profile||"adulte")+'</select></label><div class="field"><span class="lbl">Besoins particuliers</span><div class="needs-grid">'+checks+'</div></div><label class="field"><span class="lbl">Documents nécessaires</span><input id="pt-docs" class="ctrl" value="'+esc(p.documents||"")+'" placeholder="Passeport, visa…"></label><label class="field"><span class="lbl">Médicaments / traitement</span><input id="pt-meds" class="ctrl" value="'+esc(p.medications||"")+'"></label><label class="field"><span class="lbl">Allergies</span><input id="pt-allerg" class="ctrl" value="'+esc(p.allergies||"")+'"></label><label class="field"><span class="lbl">Notes besoins</span><textarea id="pt-needs" class="ctrl" placeholder="Régime, assistance, siège enfant…">'+esc(p.needs||"")+'</textarea></label><label class="field"><span class="lbl">Affaires à ne pas oublier</span><input id="pt-items" class="ctrl" value="'+esc(p.items||"")+'" placeholder="Doudou, lunettes…"></label></div>';openModal(modalShell(p.id?"Modifier le voyageur":"Nouveau voyageur",body,'<button class="btn btn-primary block" data-action="submit-participant" data-id="'+(id||"")+'">'+(p.id?"Enregistrer":"Ajouter")+'</button>'));}
function submitParticipant(id){var name=val("pt-name").trim();if(!name){flash("Ajoute un prénom");return;}var tags=selectedNeedsFromForm();var rec={id:id||uid("p"),name:name,profile:val("pt-profile"),needsTags:tags,documents:val("pt-docs").trim(),medications:val("pt-meds").trim(),allergies:val("pt-allerg").trim(),needs:val("pt-needs").trim(),items:val("pt-items").trim(),wheelchair:tags.indexOf("fauteuil")>=0||tags.indexOf("mobilite")>=0};updateTrip(function(t){var ex=t.participants.some(function(x){return x.id===rec.id;});t.participants=ex?t.participants.map(function(x){return x.id===rec.id?rec:x;}):t.participants.concat([rec]);t.travelers=Math.max(t.travelers||1,t.participants.length);return t;});closeModal();flash("Voyageur sauvegardé ✅");}

          '<div class="luxe-trust-card"><span class="luxe-trust-ic">🔒</span><div class="luxe-trust-text">Tes données restent sur ton appareil.</div></div>'+
          '<div class="luxe-trust-card"><span class="luxe-trust-ic">🌴</span><div class="luxe-trust-text">Une ambiance voyage premium, prête à personnaliser.</div></div>'+
        '</div>'+
      '</div>'+
    '</div></div>';
}

function scrDashboard(t){
  var s=budgetSummary(t),alerts=budgetAlerts(t),days=daysUntil(t.startDate),dur=tripDuration(t.startDate,t.endDate);
  var chkRem=t.checklist.filter(function(c){return !c.checked;}).length;
  var planTodo=t.plan.reduce(function(n,d){return n+d.items.filter(function(i){return i.status==="a_faire";}).length;},0);
  var tasks=chkRem+planTodo;
  var totalTasks=t.checklist.length+t.plan.reduce(function(a,d){return a+d.items.length;},0);
  var items=[];t.plan.forEach(function(d){d.items.forEach(function(it){if(it.status!=="annule"&&it.status!=="fait")items.push({date:d.date,title:it.title,time:it.time});});});
  items.sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});var up=items[0];
  var unpaid=t.reservations.filter(function(r){return !r.paid;});
  var tt=tripTypeMeta(t.type),tr=TRANSPORT_MODES.filter(function(x){return x.value===t.transport;})[0];
  var action="Tout est prêt 🎉",to="dashboard",actionTone="success",actionIc="🎉";
  if(alerts.some(function(a){return a.level==="danger";})){action="Vérifier les dépenses avant la prochaine sortie";to="budget";actionTone="danger";actionIc="🚨";}
  else if(unpaid.length){action="Régler une réservation : "+unpaid[0].name;to="reservations";actionTone="warning";actionIc="🎟️";}
  else if(up){action="Confirmer la prochaine étape : "+up.title;to="planning";actionTone="primary";actionIc="🎯";}
  else if(chkRem>0){action="Compléter la valise avant le départ";to="checklist";actionTone="primary";actionIc="🧳";}
  var name=greetName(t);
  var dbCur=t.currency,dbOver=s.available<0,dbZero=s.available===0,dbNoBudget=s.budget<=0;
  var pctLabel=dbNoBudget?"Aucun budget défini":dbOver?"Budget dépassé de "+money(-s.available,dbCur):Math.round(s.committedPct)+" % du budget déjà prévu";
  var dateLabel=(t.startDate||t.endDate)?shortDate(t.startDate)+" → "+shortDate(t.endDate):"Dates à préciser";
  var daysLabel=days!==null?(days>0?"J-"+days:(days===0?"Jour J":"En cours")):"Voyage";
  var destination=t.destination||"l'aventure";
  var dbKicker=dbOver?"Budget dépassé":"Reste pour imprévus";
  var mainAmount=dbNoBudget?money(0,dbCur):dbOver?money(-s.available,dbCur):money(s.available,dbCur);
  var dbTone=dbOver?"danger-t":"";
  var dbSub=dbNoBudget?"définis ton budget total"
    :dbOver?"Déjà payé "+money(s.spent,dbCur)+" · À payer plus tard "+money(s.reserved,dbCur)
    :dbZero?"Il ne reste plus de marge pour les imprévus."
    :"Après "+money(s.spent,dbCur)+" déjà payés et "+money(s.reserved,dbCur)+" à payer plus tard.";
  var dbTip=dbOver?"Tu as prévu "+money(-s.available,dbCur)+" de plus que ton budget. Réduis une dépense, baisse une somme à payer plus tard ou augmente ton budget total."
    :dbZero?"Tu peux encore payer ce qui est prévu, mais il ne te reste plus de marge pour les imprévus.":"";
  var daysBig=days!==null?(days>0?days+" jours":(days===0?"Aujourd’hui":"En cours")):"À planifier";
  var startLong=t.startDate?longDate(t.startDate):"Date à préciser";

  var hero='<section class="db2-hero'+(HERO_IMAGE_BASE64?' has-image':'')+'">'+
    '<div class="db2-hero-photo" '+heroImageStyle()+'></div>'+
    '<div class="db2-hero-content">'+
      '<div class="db2-eyebrow">Bonjour '+(name?esc(name.toUpperCase())+" ":"")+'<span class="db2-spark">✦</span></div>'+
      '<h1 class="db2-title">Prête pour '+esc(destination)+'&nbsp;?</h1>'+
      '<div class="db2-badges">'+
        '<span class="db2-badge">📅 '+esc(daysLabel)+' · '+esc(dateLabel)+'</span>'+
        (t.destination?'<span class="db2-badge">📍 '+esc(t.destination)+'</span>':'')+
        '<span class="db2-badge">👥 '+t.travelers+' voyageur'+(t.travelers>1?"s":"")+'</span>'+
        (tr?'<span class="db2-badge">'+tr.icon+' '+esc(tr.label)+'</span>':'')+
      '</div>'+
      '<div class="db2-budget-card">'+
        '<div class="db2-budget-left">'+
          '<div class="db2-budget-kicker">'+dbKicker+'</div>'+
          '<div class="db2-budget-amount tnum '+dbTone+'">'+mainAmount+'</div>'+
          '<div class="db2-budget-sub">'+dbSub+'</div>'+
          '<div class="db2-track'+(dbOver?" is-over":"")+'"><span style="width:'+Math.min(100,Math.max(0,Math.round(s.committedPct)))+'%"></span></div>'+
          '<div class="db2-track-meta"><span class="db2-eng'+(dbOver?" db2-eng-over":"")+'">'+pctLabel+'</span></div>'+
          (dbTip?'<div class="db2-budget-tip'+(dbOver?" is-over":" is-zero")+'">'+esc(dbTip)+'</div>':'')+
        '</div>'+
        '<button class="db2-fab" data-action="open-expense" aria-label="Ajouter une dépense"><span class="db2-fab-plus">+</span><span class="db2-fab-l">Dépense</span></button>'+
      '</div>'+
    '</div>'+
  '</section>';

  var sparkPaths=[
    "M4,26 C20,22 30,24 44,17 C58,11 70,15 84,10 C98,6 108,9 116,5",
    "M4,22 C20,24 30,18 44,20 C58,22 70,14 84,16 C98,18 108,12 116,9",
    "M4,24 C20,18 30,21 44,15 C58,12 70,17 84,12 C98,8 108,11 116,6",
    "M4,18 C20,20 30,14 44,16 C58,19 70,11 84,13 C98,15 108,8 116,7"
  ];
  function kpi(icon,label,value,note,screenId,spark,col){
    return '<button class="db2-kpi" data-action="navigate" data-screen="'+screenId+'">'+
      '<span class="db2-kpi-ic" aria-hidden="true">'+icon+'</span>'+
      '<div class="db2-kpi-label">'+esc(label)+'</div>'+
      '<div class="db2-kpi-value tnum">'+value+'</div>'+
      '<div class="db2-kpi-note">'+esc(note)+'</div>'+
      '<svg class="db2-kpi-spark" viewBox="0 0 120 32" preserveAspectRatio="none" aria-hidden="true"><path d="'+spark+'" fill="none" stroke="'+col+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
    '</button>';
  }
  var upTitle=up?(up.title.length>20?up.title.slice(0,18)+"…":up.title):"";
  var metrics='<div class="db2-kpis">'+
    kpi("💳","Déjà payé",money(s.spent,t.currency),s.budget>0?Math.round(s.spentPct)+" % du budget payé":"Aucun budget défini","budget",sparkPaths[0],"#7fb2b2")+
    kpi("🧾","À payer sur place",money(s.remainingOnSite,t.currency),unpaid.length?unpaid.length+" résa"+(unpaid.length>1?"s":"")+" à vérifier":"Estimation","reservations",sparkPaths[1],"#c6a76d")+
    kpi("✓","Tâches restantes",String(tasks),totalTasks>0?"Sur "+totalTasks+" tâches":"Tout est prêt","checklist",sparkPaths[2],"#7ba07a")+
    kpi("📍","Prochaine activité",up?esc(upTitle):"À planifier",up?shortDate(up.date)+(up.time?" · "+up.time:""):"Ajoute une étape","planning",sparkPaths[3],"#d6a08f")+
  '</div>';

  var quickCards='<div class="db2-section-h">Accès rapides</div><div class="db2-quick">'+
    '<button class="db2-quick-card" data-action="navigate" data-screen="predeparture"><span class="db2-quick-ic">🧳</span><div class="db2-quick-body"><div class="db2-quick-title">Avant départ</div><div class="db2-quick-desc">Préparez votre voyage en toute sérénité</div></div><span class="db2-quick-arr">›</span></button>'+
    '<button class="db2-quick-card" data-action="navigate" data-screen="forgotten"><span class="db2-quick-ic">🎩</span><div class="db2-quick-body"><div class="db2-quick-title">À ne pas oublier</div><div class="db2-quick-desc">Listez et cochez vos indispensables</div></div><span class="db2-quick-arr">›</span></button>'+
    '<button class="db2-quick-card" data-action="navigate" data-screen="documents"><span class="db2-quick-ic">📄</span><div class="db2-quick-body"><div class="db2-quick-title">Documents</div><div class="db2-quick-desc">Passeport, visas, réservations…</div></div><span class="db2-quick-arr">›</span></button>'+
    '<button class="db2-quick-card" data-action="navigate" data-screen="memories"><span class="db2-quick-ic">📸</span><div class="db2-quick-body"><div class="db2-quick-title">Souvenirs</div><div class="db2-quick-desc">Immortalisez et partagez vos moments</div></div><span class="db2-quick-arr">›</span></button>'+
  '</div>';

  var sideDepart='<div class="db2-side-card"><div class="db2-side-depart"><div><div class="db2-side-label">Départ dans</div><div class="db2-side-big tnum">'+esc(daysBig)+'</div><div class="db2-side-sub">'+esc(startLong)+'</div></div><div class="db2-side-depart-ic">🌴</div></div></div>';

  var resumeRows='<div class="db2-resume">'+
    (t.destination?'<div class="db2-resume-row"><span class="db2-resume-ic">📍</span><span class="db2-resume-l">Destination</span><span class="db2-resume-v">'+esc(t.destination)+'</span></div>':'')+
    '<div class="db2-resume-row"><span class="db2-resume-ic">👥</span><span class="db2-resume-l">Voyageurs</span><span class="db2-resume-v">'+t.travelers+' personne'+(t.travelers>1?"s":"")+'</span></div>'+
    (tr?'<div class="db2-resume-row"><span class="db2-resume-ic">'+tr.icon+'</span><span class="db2-resume-l">Transport</span><span class="db2-resume-v">'+esc(tr.label)+'</span></div>':'')+
    '<div class="db2-resume-row"><span class="db2-resume-ic">📅</span><span class="db2-resume-l">Durée</span><span class="db2-resume-v">'+dur+' jour'+(dur>1?"s":"")+'</span></div>'+
  '</div>';
  var sideResume='<div class="db2-side-card"><div class="db2-side-label">Résumé du voyage</div>'+resumeRows+'<button class="db2-side-link" data-action="navigate" data-screen="participants">Voir le détail du voyage ›</button></div>';

  var sideAction=actionTone==="success"
    ?'<div class="db2-side-card db2-action-card"><div class="db2-action-head"><div class="db2-side-label">Tout est sous contrôle</div><span class="db2-action-chip db2-tone-success">OK</span></div><div class="db2-action-row"><div class="db2-action-ic">'+actionIc+'</div><div class="db2-side-action-text">'+esc(action)+'</div></div></div>'
    :'<button class="db2-side-card db2-action-card" data-action="navigate" data-screen="'+to+'"><div class="db2-action-head"><div class="db2-side-label">Prochaine action</div><span class="db2-action-chip db2-tone-'+actionTone+'">'+(actionTone==="danger"?"Urgent":actionTone==="warning"?"À régler":"Go")+'</span></div><div class="db2-action-row"><div class="db2-action-ic">'+actionIc+'</div><div class="db2-side-action-text">'+esc(action)+'</div></div></button>';

  var msgs=softMessages(t).slice(0,4);
  var sideReminders=msgs.length?'<div class="db2-side-card db2-reminders"><div class="db2-side-label">Rappels</div>'+msgs.map(function(m){return '<div class="db2-reminder"><span class="db2-reminder-ic">'+m.ic+'</span><span class="db2-reminder-t">'+esc(m.text)+'</span></div>';}).join("")+'</div>':'';

  var alertHtml=alerts.map(function(a){return '<div class="db2-side-card db2-alert db2-tone-'+a.level+'"><span class="db2-alert-ic">'+(a.level==="danger"?"🚨":"⚠️")+'</span><span class="db2-alert-t">'+esc(a.message)+'</span></div>';}).join("");

  return '<div class="db2 fade-in">'+
    '<div class="db2-deco db2-deco-tr"></div><div class="db2-deco db2-deco-bl"></div>'+
    '<div class="db2-main">'+hero+metrics+quickCards+'</div>'+
    '<div class="db2-side">'+sideDepart+sideResume+sideAction+sideReminders+alertHtml+'</div>'+
  '</div>';
}

(function(){var _origClose=closeModal;closeModal=function(){if(window._ctPreview){window._ctPreview=false;applyTheme(state.theme);}_origClose();};})();
applyTheme(state.theme);
render();
</script>
</body>
